; PlatformIO configuration for ESP32 Treadmill BLE Bridge
; Board: AZDelivery ESP32 Dev Kit C V2 (ESP-WROOM-32)
;
; Architecture:
;   Treadmill TX-400WP  <--BLE/FTMS-->  ESP32  <--BLE RSC-->  Fenix 6 Pro

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; BLE libraries will be added in Stage 2
lib_deps =
