; PlatformIO configuration for ESP32 Treadmill BLE Bridge
; Board: AZDelivery ESP32 Dev Kit C V2 (ESP-WROOM-32)
;
; Architecture:
;   Treadmill TX-400WP  <--BLE/FTMS-->  ESP32  <--BLE GATT/FTMS proxy-->  CIQ DataField (Fenix 6 Pro)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.2
